{% extends "base.html" %}
{% block title %}Reset Password – RailBook{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-hd"><div class="auth-logo">🔒</div><h2>Set New Password</h2><p>Choose a strong password</p></div>
    <div class="auth-bd">
      <form method="POST">
        <div class="fg"><label class="fl">New Password</label><input type="password" name="password" class="fc" placeholder="Min 6 characters" required minlength="6" autofocus></div>
        <div class="fg"><label class="fl">Confirm Password</label><input type="password" name="confirm_password" class="fc" placeholder="Repeat password" required minlength="6"></div>
        <button type="submit" class="btn btn-gold btn-lg btn-block mt-2">Reset Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
