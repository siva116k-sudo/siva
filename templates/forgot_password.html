{% extends "base.html" %}
{% block title %}Forgot Password – RailBook{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-hd"><div class="auth-logo">🔑</div><h2>Forgot Password</h2><p>Enter your email to receive a reset link</p></div>
    <div class="auth-bd">
      <form method="POST">
        <div class="fg"><label class="fl">Email Address</label><input type="email" name="email" class="fc" placeholder="your@email.com" required autofocus></div>
        <button type="submit" class="btn btn-primary btn-lg btn-block mt-2">Send Reset Link</button>
      </form>
      <div class="auth-ft"><a href="{{ url_for('login') }}">← Back to Login</a></div>
    </div>
  </div>
</div>
{% endblock %}
